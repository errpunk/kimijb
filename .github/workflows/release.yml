name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate tag format and version match
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)?$ ]]; then
            echo "Tag must look like v0.0.1 (or include a suffix). Got: ${GITHUB_REF_NAME}"
            exit 1
          fi

          PROJECT_VERSION="$(grep -E \"^version = '\" build.gradle | head -1 | sed -E \"s/version = '([^']+)'/\\1/\")"
          if [[ -z "$PROJECT_VERSION" ]]; then
            echo "Cannot read version from build.gradle"
            exit 1
          fi

          if [[ "$PROJECT_VERSION" != "$TAG_VERSION" ]]; then
            echo "Version mismatch: tag=${TAG_VERSION}, build.gradle=${PROJECT_VERSION}"
            exit 1
          fi

      - name: Verify plugin compatibility
        run: ./gradlew --no-daemon verifyPlugin

      - name: Sign plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon signPlugin

      - name: Publish plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew --no-daemon publishPlugin

      - name: Create GitHub Release and upload signed ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            build/distributions/*-signed.zip
